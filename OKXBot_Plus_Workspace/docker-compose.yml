version: '3.8'

services:
  crypto_oracle:
    build: .
    image: crypto_oracle:v3.2.0
    container_name: crypto_oracle_bot
    restart: unless-stopped
    volumes:
      # 挂载配置文件 (宿主机:容器)
      - ./config.json:/app/config.json
      - ./.env:/app/.env
      # 挂载日志和图表目录
      - ./log:/app/log
      - ./png:/app/png
    environment:
      - TZ=Asia/Shanghai
    # 保持标准输入打开，以便接收 KeyboardInterrupt (可选)
    stdin_open: true
    tty: true
